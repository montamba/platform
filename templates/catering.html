<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catering</title>

    <style>
        *{padding: 0%;margin: 0%;}
        body{height: 100vh;background: gray;}
        .maincon{
            width: 80%;height: 80%;
            border: 5px solid gold;
            position: absolute;top: 50%;left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 20px; overflow-y: auto;
            display: flex;justify-content: center;
            padding: 20px;
        }

        .products{
            width: 35%;height: 300px;
            border: 2px solid yellow;
            border-radius: 10px;transition: 300ms;
            overflow: hidden;margin: 10px;
        }

        .products:hover{
            transform: translateY(-5px);
            box-shadow: 0 10px 5px rgba(255, 217, 0, 0.8);
        }

        .products:hover img{
            animation: sc 5s alternate infinite;
        }

        @keyframes sc {
            0%{
                transform: translateY(-20%);
            }100%{transform: translateY(20%);}
            
        }

        .imageholder{
            border: 2px solid gold;
            height: 65%;display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .imageholder img{
            width: 100%;
        }

        .tag{
            color: gold;
            display: flex; align-items: center;
            flex-direction: column;
        }

        .des{display: none;}

        .modalcontainer{
            z-index: 99;
            height: 100%;width: 100%;
            backdrop-filter: blur(5px);
            display: flex;align-items: center;
            justify-content: center;
        }

        .modal{
            width: 60%; height: 60%;
            border: 3px solid gold;
            border-radius: 20px;
            display: flex;background: lightyellow;
            position: relative;
            overflow: hidden;
        }

        .modal div:first-child{
            width: 150px;border: 2px solid;overflow: hidden;}
        .modal > div:first-child > .pimg{width: 100%;height: 200px;}
        .modal div:first-child .info{
            width: 100%;display: flex;
            
        }
        .pimg img{width: 100%;}

        .modal div:last-child{flex: 1;}
        .modal div:last-child .desc{
            width: 100%;padding: 20px;
            height: 70%;overflow-y: auto;
        }

        .modal div:last-child .buy{
            width: 100%;display: flex;
            height: 20%;
        }
        .buy button{
            width: 100%;height: 100%;font-size: 30px;
            color: gold;background: rgba(0, 0, 0, 0.4);
        }

        .exit{
            position: absolute;
            right: 0;top: 0;
            border: 2px solid;
            width: 25px;height: 25px;
            color: red;z-index: 9999;
        }

        .exit:hover{
            scale: 1.1;
        }
        



    </style>
</head>
<body>
    <div class="maincon">
        <div class="products">
            <div class="imageholder">
                <img src="https://kentstreetcellars.com.au/cdn/shop/files/coke-can_7bf866c9-bffc-449d-a173-de324ac47905_1200x1200.png?v=1687840069" alt="">
            </div>
            <div class="tag">
                <h1 class="name">name</h1>
                <h3 class="price">price</h3>
                <p class="des">
                    sample 
                </p>
            </div>
        </div>
    </div>


    <div class="modalcontainer">
        <div class="modal">
            <button class="exit" onclick="hidemodal(this)">x</button>
            <div>
                <div class="pimg">
                    <img src="https://kentstreetcellars.com.au/cdn/shop/files/coke-can_7bf866c9-bffc-449d-a173-de324ac47905_1200x1200.png?v=1687840069" alt="">
                </div>
                <div class="info">
                    <h1>nam</h1>
                    <h3>price</h3>
                </div>
            </div>
            <div>
                <div class="desc">
                    <p>sample</p>
                </div>
                <div class="buy">
                    <button>buy</button>
                </div>
            </div>
        </div>



    </div>



    <script>
        let products = [
        {name:"coca-cola", img:"https://kentstreetcellars.com.au/cdn/shop/files/coke-can_7bf866c9-bffc-449d-a173-de324ac47905_1200x1200.png?v=1687840069",price:9}
        ]

        function hidemodal(el){
            el.parentNode.parentNode.style.display = "none"
        }
    </script>
</body>
</html>
