<!DOCTYPE html>
<html>

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js"></script>
    <style>
        *{padding: 0;margin: 0;font-family: 'Courier New', monospace;}
        body{min-height: 100vh;width: 100%;}
        nav{
            background: linear-gradient(to top left, blue, lightblue);
            padding: 20px;text-align: center;font-size: larger;color: aqua;
            text-shadow: 0 5px 10px black;
        }

        .welcome{
            min-height: 70vh;background: url("https://tinyurl.com/okpopw");
            background-size: cover;background-repeat: no-repeat;
            display: flex;align-items: center;justify-content: center;font-size: 20px;
        }

        .welcome h1{
            background: rgba(173, 216, 230, 0.7);
            border: 3px solid blue;border-radius: 10px;
            color: blue;padding: 20px;text-shadow: 5px 5px 10px lightblue;
        }

        .form{
            margin:30px auto;width: 500px;height: fit-content;border: 2px solid;border-radius: 20px;
            background: linear-gradient(to left top, rgba(125, 125, 248, 0.8), lightblue);
        }

        .form div:first-child{
            width: 100%;padding: 20px 5px;
            text-align: center;color: blue;
        }

        .yearholder{
            width: 100%;padding: 20;display: flex;
            justify-content: center;margin-bottom: 20px; 
        }

        .yearholder input{
            width: 80%;padding: 20px;border-radius: 10px;
            background: linear-gradient(to right, rgb(110, 213, 247), lightblue);
            margin: auto;border: 2px solid blue;
        }

        .monthholder{padding: 20px;display: none;justify-content: center;flex-wrap: wrap;}
        .monthholder input{
            width: 40%;padding: 10px;margin: 10px;
            border-radius: 5px;border: 3px solid;
        }

        .monthholder input:hover{transform: translateY(-2px);box-shadow: 0 5px 10px rgba(0, 0, 0, 0.5);}

        #choose{
            margin: auto;display: block;
            padding: 10px 20px;border-radius: 20px;color: blue;
            background: linear-gradient(to left top, rgb(91, 197, 232), lightblue);
        }

        canvas{
            display: block;min-height: 300px;
            width: 500px;border: 1px solid;margin: auto;margin-top: 20px;
        }
    </style>


</head>
<body>
    <nav><h2>Profit Radar</h2></nav>

    <div class="welcome">
        <h1>Track your Record with Profit Radar</h1>
    </div>

    <div class="form">
    <div>
        <h1>Add new year</h1>
    </div>

    <div class="yearholder">
        <input type="text" id="y" onchange="showmonths(this)"  placeholder="Add year">
    </div>

    <div class="monthholder" id="monthholder">
        <input type="text" placeholder="Jan">
        <input type="text" placeholder="Feb">
        <input type="text" placeholder="Mar">
        <input type="text" placeholder="Apr">
        <input type="text" placeholder="May">
        <input type="text" placeholder="Jun">
        <input type="text" placeholder="Jul">
        <input type="text" placeholder="Aug">
        <input type="text" placeholder="Sep">
        <input type="text" placeholder="Oct">
        <input type="text" placeholder="Nov">
        <input type="text" placeholder="Dec">
        <input type="button" onclick="addyear()" value="Add">
    </div>
    </div>



    <select name="" id="choose" onchange="showdata(this)">
        <option value="all">Show all</option>
    </select>

    <canvas id="myChart" style="max-width: 700px;"></canvas>
    

    <script>

        let datus = []
        let colors = ["blue","yellow", "green", "red"]
        num = 0
        function showmonths(el){
            let esist = false
            datus.forEach(v=>{
                if(el.value ==v.label){
                    alert("year already there");esist = true;el.value = ""
                }})
            if(!esist) document.getElementById("monthholder").style.display = (el.value.length > 1) ? "flex":"none";
        }

        function addyear(){
            let inputs = document.getElementById("monthholder").querySelectorAll("input")
            let values = [];let year = document.getElementById("y").value
            inputs.forEach((v)=>{
                if(v.value != "Add"){values.push(v.value);v.value = ""}
            })
            document.getElementById("y").value = ""
            document.getElementById("monthholder").style.display = "none"
            datus.push({ 
                label:year,data: values,borderColor: colors[num],fill: true
            })
            num = (num + 1) % 4
            document.getElementById("choose").innerHTML +=` <option value="${year}">${year}</option>`
            showgraph(datus)
        }


        function showdata(el){
            if(el.value == "all"){showgraph(datus)
            }else{
                let ndata = []
                datus.forEach(v=>{if(v.label == el.value) ndata.push(v);})
                showgraph(ndata)
            }
        }

        function showgraph(data){
            const xValues = ["January","Febuary", "march", "april", "may","june","july","august","september","october","november","december"];
            new Chart("myChart", {
            type: "line",
            data: {
                labels: xValues,datasets: data
            },
            options: {
                legend: {display: true},
            }
            });
        } 
</script>
