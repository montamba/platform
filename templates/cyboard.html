<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyBoard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Courier New', monospace;
}

body{
    height: 100vh;
    width: 100%;
}

.page {
  display: none;
  height: 100%;
  width: 100%;
}
#page1 {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:url('https://www.livehome3d.com/assets/img/articles/design-house/how-to-design-a-house.jpg');
  background-size: cover;
  background-repeat: no-repeat;
  padding: 20px;
}
#logincon {
  background: rgba(255, 255, 255, 0.95);
  padding: 40px 30px;
  border-radius: 10px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  max-width: 350px;
  width: 90%;
  text-align: center;
}
#logincon h1 {
  font-size: 2.2em;
  color: blue;
  margin-bottom: 10px;
}
#logincon p {
  color: #555;
  margin-bottom: 25px;
}
#logincon input {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 10px;
  font-size: 1em;
  transition: border-color 0.3s;
}
#logincon input:focus {
  border-color: skyblue;
  outline: none;
}
.btn {
  padding: 12px 18px;
  background: blue;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 1em;
  transition: background 0.3s;
}
.btn:hover {
  background: skyblue;
}
#logmess {
  color: red;
  margin-top: 10px;
  font-size: 0.9em;
}
#page2 {
  background: #e9f1f7;
  min-height: 100%;
  padding: 20px;
}
#galleryHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1400px;
  margin: 0 auto 20px auto;
}
#gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  max-width: 1400px;
  margin: auto;
}
.housecard {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  overflow: hidden;
  transition: transform 0.2s;
}
.housecard:hover {
  transform: translateY(-5px);
}
.house-img-wrapper {
  width: 100%;
  padding-top: 100%;
  position: relative;
}
.house-img-wrapper img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 10px 10px 0 0;
}
.house-info {
  text-align: center;
  padding: 12px;
}
.view-btn {
  background: blue;
  color: white;padding: 6px 16px;border: none;
  border-radius: 10px;
  cursor: pointer;font-size: large;
  margin-bottom: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: 300ms;
}
.view-btn:hover {background: skyblue;}
.house-info h3 {margin-bottom: 6px;font-size: larger;color: #333;}
.house-info p {color: #555;font-size: 0.85em;line-height: 1.3em;}
#page3 {position: relative;height: 100%;width: 100%;}
#map {height: 100%;width: 100%;}
#backBtn {
  position: absolute;
  top: 20px;right: 20px;background: blue;
  color: white;padding: 10px 18px;
  border: none;border-radius: 10px;cursor: pointer;
  z-index: 1000;transition: 300ms;
}
#backBtn:hover {background: skyblue;}
#details {
  position: absolute;
  bottom: 20px;left: 20px;
  background: rgba(255,255,255,0.95);
  padding: 15px;border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.25);
  max-width: 250px;z-index: 1000;
}
</style>
</head>
<body>
<div id="page1" class="page" style="display:flex;">
  <div id="logincon">
    <h1>CyBoard</h1>
    <p>Find safe and affordable boarding houses near your school</p>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="loginUser()">Sign In</button>
    <p id="logmess"></p>
  </div>
</div>
<div id="page2" class="page">
  <div id="galleryHeader">
    <button class="btn" onclick="showFullMap()">View Map</button>
    <button class="btn" id="logoutBtn" onclick="logout()">Log Out</button>
  </div>
  <div id="gallery"></div>
</div>
<div id="page3" class="page">
  <button id="backBtn" onclick="backToGallery()">Back to Gallery</button>
  <div id="details"></div>
  <div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const pages=["page1","page2","page3"];
    function showPage(id){
        pages.forEach(
            p=>{document.getElementById(p).style.display="none";}
          )
        document.getElementById(id).style.display="block";

    }

    const houses=[
        {name:"GiL Store/Boarding House",img:"thumbnail (1).jpg",coords:[10.691904,122.567859],desc:"Nice and quiet boarding house."},
        {name:"Malhabour Boarding House",img:"g.jpg.png",coords:[10.695935,122.554871],desc:"Affordable stay with friendly owner."},
        {name:"3J and R Boarding House",img:"f.jfif",coords:[10.711453,122.557811],desc:"Clean and cozy rooms."},
        {name:"BOARDING HOUSE",img:"k.jfif",coords:[10.698027,122.561705],desc:"Spacious rooms with good ventilation."},
        {name:"Villasor Boarding House",img:"p.jfif",coords:[10.697869,122.560638],desc:"Close to main road and shops."},
        {name:"Gonzaga Boarding House",img:"thumbnail.jfif",coords:[10.707146,122.565963],desc:"Modern interiors and safe location."},
        {name:"Vinco Boarding House",img:"u.jfif",coords:[10.711618,122.566618],desc:"Bright rooms with balcony."},
        {name:"Rency Boarding House",img:"t.jfif",coords:[10.711700,122.563342],desc:"Budget friendly and accessible."}
    ];

    function loginUser(){
        const u=document.getElementById("username").value.trim();
        const p=document.getElementById("password").value.trim();
        if(u&&p){buildGallery();showPage("page2");}
        else{document.getElementById("logmess").innerText="Please enter username and password.";}
    }

    function logout(){
        showPage("page1");
        document.getElementById("username").value="";
        document.getElementById("password").value="";
        document.getElementById("logmess").innerText="";
    }

    function buildGallery(){
        const gallery=document.getElementById("gallery");
        gallery.innerHTML="";
        houses.forEach((h,i)=>{
            const card=document.createElement("div");
            card.className="housecard";
            card.innerHTML=`
            <div class="house-img-wrapper"><img src="${h.img}" alt="${h.name}"></div>
            <div class="house-info">
                <button class="view-btn" onclick="showHouse(${i})">View</button>
                <h3>${h.name}</h3>
                <p>${h.desc}</p>
            </div>`;
            gallery.appendChild(card);
        });
    }

    let map,currentMarker;
    function showHouse(i){
        const h=houses[i];
        showPage("page3");
        document.getElementById("details").innerHTML=`<h2>${h.name}</h2><img src="${h.img}" style="width:100%;border-radius:10px;margin-top:10px;"><p>${h.desc}</p>;`
        if(!map){
            map=L.map("map").setView(h.coords,15);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);
        }else{
            map.setView(h.coords,15);
        }
        if(currentMarker){map.removeLayer(currentMarker);}
        currentMarker=L.marker(h.coords).addTo(map).bindPopup(`<b>${h.name}</b>`).openPopup();
    }
    function showFullMap(){
        showPage("page3");
        document.getElementById("details").innerHTML="";
        if(!map){
            map=L.map("map").setView([10.692232,122.573977],12);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap"}).addTo(map);
        }else{
            map.setView([14.5995,120.9842],12);
            if(currentMarker){map.removeLayer(currentMarker);currentMarker=null;}
        }
    }
    function backToGallery(){
        showPage("page2");
    }
</script>
</body>
</html>
